site:
  title: WheelRent Documentation
  url: http://carrental-docs.nmlabs.gr
  start_page: wr::index.adoc
  robots: allow

git:
  ensure_git_suffix: false

urls:
  html_extension_style: indexify

content:
  edit_url: false
  sources:
    - url: .
      branches:
        - HEAD
      start_path: docs

ui:
  bundle:
    url: ./vendor/antora-ui-default.zip
  supplemental_files: ./supplemental-ui

asciidoc:
  sourcemap: false
  attributes:
    hide-uri-scheme: ~
    icons: font
    page-toctitle: Περιεχόμενα
    note-caption: 'ΣΗΜΕΙΩΣΗ'
    tip-caption: 'ΣΥΜΒΟΥΛΗ'
    important-caption: 'ΣΗΜΑΝΤΙΚΟ'
    caution-caption: 'ΠΡΟΣΟΧΗ'
    warning-caption: 'ΠΡΟΕΙΔΟΠΟΙΗΣΗ'
    sonarqube-appId: 'CarRental_car-rental_be95db4a-452c-44cf-8ca7-85884c65329f'
    kroki-server-url: https://kroki.nmlabs.gr
  extensions:
    - 'asciidoctor-kroki'
    - '@asciidoctor/tabs'

antora:
  extensions:
    - require: '@antora/lunr-extension'
      languages: [en, el]
      index_latest_only: true
